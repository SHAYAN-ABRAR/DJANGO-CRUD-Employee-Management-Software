{% extends 'base.html' %}
{% block title %}Update Employee{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm p-4 border-warning">
            <h2>Update Employee: {{ employee.emp_name }}</h2>
            <form action="{% url 'update_emp' employee.id %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" name="emp_id" value="{{ employee.emp_id }}" class="form-control">
                </div>
                <div class="form-group">
                    <label>Employee Name</label>
                    <input type="text" name="emp_name" value="{{ employee.emp_name }}" class="form-control">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="emp_dept" value="{{ employee.emp_dept }}" class="form-control">
                </div>
                <button type="submit" id="new" class="btn btn-warning w-100">Update Record</button>
            </form>
            <a href="{% url 'home' %}" class="btn btn-link mt-2">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
